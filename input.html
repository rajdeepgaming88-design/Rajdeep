<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Universal AI Chat</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        gray: {
                            850: '#1f2937',
                            900: '#111827',
                            950: '#030712',
                        }
                    }
                }
            }
        }
        
        // Prevent FOUC for Dark Mode
        try {
            const settings = JSON.parse(localStorage.getItem('gemini_clone_settings'));
            if (settings && settings.theme === 'dark') {
                document.documentElement.classList.add('dark');
            } else if (!settings && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                document.documentElement.classList.add('dark');
            }
        } catch (e) {}
    </script>

    <!-- Marked.js for Markdown Parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        /* Base Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background-color: rgba(156, 163, 175, 0.4);
            border-radius: 10px;
        }
        .dark ::-webkit-scrollbar-thumb {
            background-color: rgba(75, 85, 99, 0.6);
        }

        /* Markdown Styles */
        .markdown-body {
            font-size: 0.95rem;
            line-height: 1.6;
            word-wrap: break-word;
        }
        .markdown-body p { margin-bottom: 1em; }
        .markdown-body p:last-child { margin-bottom: 0; }
        .markdown-body h1, .markdown-body h2, .markdown-body h3, .markdown-body h4 {
            font-weight: 600;
            margin-top: 1.5em;
            margin-bottom: 0.5em;
            line-height: 1.25;
        }
        .markdown-body h1 { font-size: 1.5em; }
        .markdown-body h2 { font-size: 1.25em; }
        .markdown-body h3 { font-size: 1.1em; }
        .markdown-body ul, .markdown-body ol {
            margin-top: 0;
            margin-bottom: 1em;
            padding-left: 2em;
        }
        .markdown-body ul { list-style-type: disc; }
        .markdown-body ol { list-style-type: decimal; }
        .markdown-body li + li { margin-top: 0.25em; }
        .markdown-body code {
            background-color: rgba(156, 163, 175, 0.2);
            padding: 0.2em 0.4em;
            border-radius: 4px;
            font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", Menlo, monospace;
            font-size: 0.85em;
        }
        .dark .markdown-body code { background-color: rgba(75, 85, 99, 0.4); }
        .markdown-body pre {
            background-color: #1f2937;
            color: #f3f4f6;
            padding: 1rem;
            border-radius: 0.5rem;
            overflow-x: auto;
            margin-top: 1em;
            margin-bottom: 1em;
        }
        .markdown-body pre code {
            background-color: transparent;
            padding: 0;
            color: inherit;
            font-size: 0.9em;
        }
        .markdown-body blockquote {
            padding: 0 1em;
            color: #6b7280;
            border-left: 0.25em solid #e5e7eb;
            margin-bottom: 1em;
        }
        .dark .markdown-body blockquote {
            color: #9ca3af;
            border-left-color: #4b5563;
        }
        .markdown-body a {
            color: #3b82f6;
            text-decoration: underline;
        }
        
        /* Textarea Auto-resize */
        textarea {
            resize: none;
            overflow-y: hidden;
            min-height: 44px;
            max-height: 200px;
        }
        textarea::-webkit-scrollbar { overflow-y: auto; }
        
        /* Cursor Blinking for Streaming */
        .cursor-blink {
            display: inline-block;
            width: 6px;
            height: 16px;
            background-color: currentColor;
            animation: blink 1s step-end infinite;
            vertical-align: middle;
            margin-left: 2px;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
    </style>
</head>
<body class="bg-white dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen transition-colors duration-200 antialiased selection:bg-blue-200 dark:selection:bg-blue-900">

    <!-- Fallback Loader -->
    <div id="loading" class="fixed inset-0 z-[9999] flex flex-col items-center justify-center bg-white dark:bg-gray-900">
        <svg class="animate-spin h-10 w-10 text-blue-500 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <div class="text-lg font-medium text-gray-600 dark:text-gray-300">Loading App...</div>
    </div>

    <!-- App Container -->
    <div id="app" class="flex min-h-screen hidden relative">
        
        <!-- Mobile Sidebar Overlay -->
        <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-30 hidden md:hidden transition-opacity"></div>

        <!-- Sidebar -->
        <aside id="sidebar" class="fixed inset-y-0 left-0 z-40 w-72 bg-gray-50 dark:bg-gray-850 border-r border-gray-200 dark:border-gray-800 transform -translate-x-full md:translate-x-0 transition-transform duration-300 ease-in-out md:sticky md:top-0 md:h-screen flex flex-col">
            <!-- Sidebar Header -->
            <div class="p-4 flex items-center justify-between border-b border-gray-200 dark:border-gray-800">
                <button id="new-chat-btn" class="flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-medium transition-colors w-full justify-center">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd" />
                    </svg>
                    New Chat
                </button>
                <button id="close-sidebar-btn" class="md:hidden p-2 text-gray-500 hover:text-gray-700 dark:hover:text-gray-300 ml-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            
            <!-- Chat List -->
            <div id="chat-list" class="flex-1 overflow-y-auto p-3 space-y-1">
                <!-- Chat items injected here via JS -->
            </div>
        </aside>

        <!-- Main Content area -->
        <main class="flex-1 flex flex-col min-w-0 min-h-screen relative w-full">
            
            <!-- Header -->
            <header class="sticky top-0 z-20 flex items-center justify-between px-4 py-3 bg-white/80 dark:bg-gray-900/80 backdrop-blur-md border-b border-gray-200 dark:border-gray-800">
                <div class="flex items-center gap-3">
                    <button id="menu-btn" class="md:hidden p-2 -ml-2 text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-md">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                        </svg>
                    </button>
                    <h1 class="font-semibold text-lg truncate flex items-center gap-2">
                        <span id="current-chat-title">New Chat</span>
                    </h1>
                </div>
                
                <div class="flex items-center gap-1 sm:gap-2">
                    <button id="prompt-btn" class="p-2 text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 transition" title="System Prompt">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a8 8 0 0 0-8 8c0 5.4 3.6 8 8 8s8-2.6 8-8a8 8 0 0 0-8-8z"></path><path d="M12 18v4"></path><path d="M8 22h8"></path><path d="M15 9a3 3 0 0 0-6 0"></path><path d="M12 12v3"></path></svg>
                    </button>
                    <button id="theme-btn" class="p-2 text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 transition" title="Toggle Theme">
                        <svg id="theme-icon-dark" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 hidden dark:block" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4.22 1.32a1 1 0 011.415 0l.708.708a1 1 0 01-1.414 1.414l-.708-.708a1 1 0 010-1.414zM18 10a1 1 0 01-1 1h-1a1 1 0 110-2h1a1 1 0 011 1zm-1.32 4.22a1 1 0 010 1.415l-.708.708a1 1 0 01-1.414-1.414l.708-.708a1 1 0 011.415 0zM10 16a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zm-4.22-1.32a1 1 0 01-1.415 0l-.708-.708a1 1 0 011.414-1.414l.708.708a1 1 0 010 1.414zM2 10a1 1 0 011-1h1a1 1 0 110 2H3a1 1 0 01-1-1zm1.32-4.22a1 1 0 010-1.415l.708-.708a1 1 0 011.414 1.414l-.708.708a1 1 0 01-1.415 0zM10 4a6 6 0 100 12 6 6 0 000-12z" clip-rule="evenodd" /></svg>
                        <svg id="theme-icon-light" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 dark:hidden" viewBox="0 0 20 20" fill="currentColor"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z" /></svg>
                    </button>
                    <button id="settings-btn" class="p-2 text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 transition" title="Settings">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z" clip-rule="evenodd" />
                        </svg>
                    </button>
                </div>
            </header>

            <!-- Messages Area -->
            <div id="messages-container" class="flex-1 w-full max-w-4xl mx-auto p-4 sm:p-6 space-y-6 pb-8">
                <!-- Welcome State -->
                <div id="welcome-screen" class="flex flex-col items-center justify-center h-full text-center space-y-4 text-gray-500 dark:text-gray-400 mt-10 md:mt-20">
                    <div class="w-16 h-16 bg-blue-100 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 rounded-2xl flex items-center justify-center mb-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                        </svg>
                    </div>
                    <h2 class="text-2xl font-semibold text-gray-800 dark:text-gray-200">How can I help you today?</h2>
                    <p class="max-w-md">Start a conversation by typing below. Please configure your API key in settings if you haven't yet.</p>
                </div>
                <!-- Dynamic messages injected here -->
            </div>

            <!-- Input Area -->
            <div class="sticky bottom-0 z-20 w-full bg-gradient-to-t from-white via-white dark:from-gray-900 dark:via-gray-900 to-transparent pt-4 pb-4 px-4 border-t border-gray-100 dark:border-gray-800/50 shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.02)]">
                <div class="max-w-4xl mx-auto relative rounded-2xl bg-white dark:bg-gray-850 border border-gray-300 dark:border-gray-700 shadow-sm focus-within:ring-2 focus-within:ring-blue-500/50 transition-all">
                    <form id="chat-form" class="flex items-end gap-2 p-2 relative">
                        <textarea 
                            id="chat-input" 
                            rows="1"
                            class="w-full bg-transparent border-0 focus:ring-0 text-gray-900 dark:text-gray-100 placeholder-gray-500 dark:placeholder-gray-400 py-3 pl-3 pr-12 m-0 text-base outline-none block"
                            placeholder="Message AI..."
                            required
                        ></textarea>
                        <button type="submit" id="send-btn" class="absolute right-3 bottom-3 p-2 bg-blue-600 hover:bg-blue-700 text-white rounded-xl transition-colors disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                <path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z" />
                            </svg>
                        </button>
                    </form>
                </div>
                <div class="text-center text-xs text-gray-400 dark:text-gray-500 mt-3">
                    Powered by OpenRouter API
                </div>
            </div>
            
        </main>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="fixed inset-0 bg-black/50 z-[100] hidden flex items-center justify-center p-4 backdrop-blur-sm transition-opacity">
        <div class="bg-white dark:bg-gray-850 rounded-2xl w-full max-w-md shadow-2xl border border-gray-200 dark:border-gray-700 overflow-hidden">
            <div class="px-6 py-4 border-b border-gray-200 dark:border-gray-700 flex justify-between items-center">
                <h3 class="text-lg font-semibold text-gray-900 dark:text-gray-100">Settings</h3>
                <button type="button" class="close-modal-btn text-gray-400 hover:text-gray-600 dark:hover:text-gray-300">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
                </button>
            </div>
            <div class="p-6 space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">OpenRouter API Key</label>
                    <input type="password" id="api-key-input" class="w-full px-4 py-2 bg-gray-50 dark:bg-gray-900 border border-gray-300 dark:border-gray-700 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-gray-900 dark:text-white" placeholder="sk-or-v1-...">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Model ID</label>
                    <input type="text" id="model-input" class="w-full px-4 py-2 bg-gray-50 dark:bg-gray-900 border border-gray-300 dark:border-gray-700 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-gray-900 dark:text-white" placeholder="deepseek/deepseek-r1:free">
                    <p class="text-xs text-gray-500 mt-1">Default: deepseek/deepseek-r1:free</p>
                </div>
            </div>
            <div class="px-6 py-4 bg-gray-50 dark:bg-gray-900/50 border-t border-gray-200 dark:border-gray-700 flex justify-end gap-3">
                <button type="button" class="close-modal-btn px-4 py-2 text-sm font-medium text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg transition-colors">Cancel</button>
                <button type="button" id="save-settings-btn" class="px-4 py-2 text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 rounded-lg transition-colors">Save Changes</button>
            </div>
        </div>
    </div>

    <!-- System Prompt Modal -->
    <div id="prompt-modal" class="fixed inset-0 bg-black/50 z-[100] hidden flex items-center justify-center p-4 backdrop-blur-sm transition-opacity">
        <div class="bg-white dark:bg-gray-850 rounded-2xl w-full max-w-lg shadow-2xl border border-gray-200 dark:border-gray-700 overflow-hidden">
            <div class="px-6 py-4 border-b border-gray-200 dark:border-gray-700 flex justify-between items-center">
                <h3 class="text-lg font-semibold text-gray-900 dark:text-gray-100">System Prompt</h3>
                <button type="button" class="close-modal-btn text-gray-400 hover:text-gray-600 dark:hover:text-gray-300">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
                </button>
            </div>
            <div class="p-6">
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Instructions for AI behavior (Global)</label>
                <textarea id="prompt-input" rows="5" class="w-full px-4 py-2 bg-gray-50 dark:bg-gray-900 border border-gray-300 dark:border-gray-700 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-gray-900 dark:text-white" placeholder="You are a helpful assistant..."></textarea>
            </div>
            <div class="px-6 py-4 bg-gray-50 dark:bg-gray-900/50 border-t border-gray-200 dark:border-gray-700 flex justify-end gap-3">
                <button type="button" class="close-modal-btn px-4 py-2 text-sm font-medium text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg transition-colors">Cancel</button>
                <button type="button" id="save-prompt-btn" class="px-4 py-2 text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 rounded-lg transition-colors">Save</button>
            </div>
        </div>
    </div>

    <!-- Application Logic -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- State Management ---
            const DEFAULT_SETTINGS = {
                apiKey: '',
                model: 'deepseek/deepseek-r1:free',
                systemPrompt: 'You are a helpful, smart, kind, and efficient AI assistant.',
                theme: 'light'
            };

            let settings = JSON.parse(localStorage.getItem('gemini_clone_settings')) || { ...DEFAULT_SETTINGS };
            // Ensure defaults for missing keys (upgrades)
            if(!settings.model) settings.model = DEFAULT_SETTINGS.model;
            if(!settings.systemPrompt) settings.systemPrompt = DEFAULT_SETTINGS.systemPrompt;

            let chats = JSON.parse(localStorage.getItem('gemini_clone_chats')) || [];
            let activeChatId = localStorage.getItem('gemini_clone_active_chat') || null;
            let isGenerating = false;
            let abortController = null;

            // --- DOM Elements ---
            const els = {
                app: document.getElementById('app'),
                loading: document.getElementById('loading'),
                sidebar: document.getElementById('sidebar'),
                sidebarOverlay: document.getElementById('sidebar-overlay'),
                menuBtn: document.getElementById('menu-btn'),
                closeSidebarBtn: document.getElementById('closeSidebarBtn'), // case mismatch handled below
                chatList: document.getElementById('chat-list'),
                newChatBtn: document.getElementById('new-chat-btn'),
                chatContainer: document.getElementById('messages-container'),
                welcomeScreen: document.getElementById('welcome-screen'),
                currentChatTitle: document.getElementById('current-chat-title'),
                
                chatForm: document.getElementById('chat-form'),
                chatInput: document.getElementById('chat-input'),
                sendBtn: document.getElementById('send-btn'),
                
                settingsBtn: document.getElementById('settings-btn'),
                promptBtn: document.getElementById('prompt-btn'),
                themeBtn: document.getElementById('theme-btn'),
                
                settingsModal: document.getElementById('settings-modal'),
                promptModal: document.getElementById('prompt-modal'),
                closeModalBtns: document.querySelectorAll('.close-modal-btn'),
                
                apiKeyInput: document.getElementById('api-key-input'),
                modelInput: document.getElementById('model-input'),
                saveSettingsBtn: document.getElementById('save-settings-btn'),
                
                promptInput: document.getElementById('prompt-input'),
                savePromptBtn: document.getElementById('save-prompt-btn')
            };
            
            // Correct fallback for mismatch ID
            const closeSidebarBtn = document.getElementById('close-sidebar-btn');

            // --- Utilities ---
            const generateId = () => Math.random().toString(36).substr(2, 9);
            const saveState = () => {
                localStorage.setItem('gemini_clone_chats', JSON.stringify(chats));
                if (activeChatId) {
                    localStorage.setItem('gemini_clone_active_chat', activeChatId);
                } else {
                    localStorage.removeItem('gemini_clone_active_chat');
                }
                localStorage.setItem('gemini_clone_settings', JSON.stringify(settings));
            };
            
            const scrollToBottom = () => {
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            };

            const escapeHTML = (str) => {
                const p = document.createElement('p');
                p.textContent = str;
                return p.innerHTML;
            };

            // --- UI Rendering ---
            const applyTheme = () => {
                if (settings.theme === 'dark') {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
            };

            const renderSidebar = () => {
                els.chatList.innerHTML = '';
                
                // Sort by most recent first (assuming new messages pushed to end, we just reverse array rendering)
                const sortedChats = [...chats].reverse();

                sortedChats.forEach(chat => {
                    const isActive = chat.id === activeChatId;
                    const div = document.createElement('div');
                    div.className = `group flex items-center justify-between p-2 rounded-lg cursor-pointer transition-colors ${isActive ? 'bg-blue-50 dark:bg-blue-900/40 text-blue-700 dark:text-blue-300' : 'text-gray-700 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-800'}`;
                    
                    const titleSpan = document.createElement('span');
                    titleSpan.className = 'truncate flex-1 text-sm font-medium';
                    titleSpan.textContent = chat.title || 'New Chat';
                    
                    const actionsDiv = document.createElement('div');
                    actionsDiv.className = `flex items-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity ${isActive ? 'opacity-100' : ''}`;
                    
                    // Rename btn
                    const editBtn = document.createElement('button');
                    editBtn.className = 'p-1 text-gray-500 hover:text-gray-800 dark:hover:text-gray-100 rounded';
                    editBtn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" /></svg>';
                    editBtn.onclick = (e) => {
                        e.stopPropagation();
                        const newTitle = prompt('Enter new chat name:', chat.title);
                        if (newTitle && newTitle.trim()) {
                            chat.title = newTitle.trim();
                            saveState();
                            renderSidebar();
                            if (isActive) updateHeaderTitle();
                        }
                    };

                    // Delete btn
                    const delBtn = document.createElement('button');
                    delBtn.className = 'p-1 text-red-400 hover:text-red-600 rounded';
                    delBtn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>';
                    delBtn.onclick = (e) => {
                        e.stopPropagation();
                        if(confirm('Delete this chat?')) {
                            chats = chats.filter(c => c.id !== chat.id);
                            if (activeChatId === chat.id) {
                                activeChatId = chats.length > 0 ? chats[0].id : null;
                            }
                            saveState();
                            renderSidebar();
                            loadActiveChat();
                        }
                    };

                    actionsDiv.appendChild(editBtn);
                    actionsDiv.appendChild(delBtn);
                    
                    div.appendChild(titleSpan);
                    div.appendChild(actionsDiv);
                    
                    div.onclick = () => {
                        activeChatId = chat.id;
                        saveState();
                        renderSidebar();
                        loadActiveChat();
                        toggleSidebar(false);
                    };

                    els.chatList.appendChild(div);
                });
            };

            const createMessageBubble = (role, content, messageId) => {
                const wrapper = document.createElement('div');
                wrapper.className = `flex w-full ${role === 'user' ? 'justify-end' : 'justify-start'}`;
                wrapper.id = messageId || `msg-${Date.now()}`;

                const inner = document.createElement('div');
                
                if (role === 'user') {
                    inner.className = 'max-w-[85%] md:max-w-[75%] bg-blue-100 dark:bg-blue-900/60 text-blue-900 dark:text-blue-100 px-5 py-3 rounded-2xl rounded-tr-sm shadow-sm whitespace-pre-wrap font-medium';
                    inner.textContent = content;
                } else {
                    inner.className = 'max-w-[95%] md:max-w-[85%] bg-gray-50 dark:bg-gray-800 text-gray-800 dark:text-gray-200 px-5 py-4 rounded-2xl rounded-tl-sm shadow-sm border border-gray-100 dark:border-gray-700 markdown-body';
                    inner.innerHTML = content ? marked.parse(content) : '<span class="cursor-blink"></span>';
                }

                wrapper.appendChild(inner);
                return wrapper;
            };

            const updateHeaderTitle = () => {
                const activeChat = chats.find(c => c.id === activeChatId);
                els.currentChatTitle.textContent = activeChat ? activeChat.title : 'New Chat';
            };

            const loadActiveChat = () => {
                // Remove all existing messages
                const bubbles = els.chatContainer.querySelectorAll('.flex.w-full');
                bubbles.forEach(b => b.remove());

                const activeChat = chats.find(c => c.id === activeChatId);
                
                if (!activeChat || activeChat.messages.length === 0) {
                    els.welcomeScreen.classList.remove('hidden');
                } else {
                    els.welcomeScreen.classList.add('hidden');
                    activeChat.messages.forEach(msg => {
                        // skip system prompts in UI
                        if(msg.role !== 'system') {
                            const bubble = createMessageBubble(msg.role, msg.content);
                            els.chatContainer.appendChild(bubble);
                        }
                    });
                }
                
                updateHeaderTitle();
                setTimeout(scrollToBottom, 50);
            };

            // --- Modal Logic ---
            const openModal = (modalEl) => {
                modalEl.classList.remove('hidden');
                document.body.style.overflow = 'hidden';
            };
            
            const closeModal = (modalEl) => {
                modalEl.classList.add('hidden');
                document.body.style.overflow = '';
            };

            els.closeModalBtns.forEach(btn => {
                btn.onclick = (e) => {
                    const modal = e.target.closest('.fixed.inset-0');
                    if (modal) closeModal(modal);
                };
            });

            els.settingsBtn.onclick = () => {
                els.apiKeyInput.value = settings.apiKey;
                els.modelInput.value = settings.model;
                openModal(els.settingsModal);
            };

            els.saveSettingsBtn.onclick = () => {
                settings.apiKey = els.apiKeyInput.value.trim();
                settings.model = els.modelInput.value.trim() || DEFAULT_SETTINGS.model;
                saveState();
                closeModal(els.settingsModal);
            };

            els.promptBtn.onclick = () => {
                els.promptInput.value = settings.systemPrompt;
                openModal(els.promptModal);
            };

            els.savePromptBtn.onclick = () => {
                settings.systemPrompt = els.promptInput.value.trim();
                saveState();
                closeModal(els.promptModal);
            };

            els.themeBtn.onclick = () => {
                settings.theme = settings.theme === 'light' ? 'dark' : 'light';
                saveState();
                applyTheme();
            };

            // --- Sidebar Mobile Logic ---
            const toggleSidebar = (show) => {
                if (show) {
                    els.sidebar.classList.remove('-translate-x-full');
                    els.sidebarOverlay.classList.remove('hidden');
                } else {
                    els.sidebar.classList.add('-translate-x-full');
                    els.sidebarOverlay.classList.add('hidden');
                }
            };

            els.menuBtn.onclick = () => toggleSidebar(true);
            closeSidebarBtn.onclick = () => toggleSidebar(false);
            els.sidebarOverlay.onclick = () => toggleSidebar(false);

            els.newChatBtn.onclick = () => {
                activeChatId = null;
                saveState();
                renderSidebar();
                loadActiveChat();
                toggleSidebar(false);
                els.chatInput.focus();
            };

            // --- Auto-resize Textarea ---
            els.chatInput.addEventListener('input', function() {
                this.style.height = '44px';
                let scrollHeight = this.scrollHeight;
                this.style.height = (scrollHeight <= 200 ? scrollHeight : 200) + 'px';
                
                if (this.value.trim().length > 0) {
                    els.sendBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                } else {
                    els.sendBtn.classList.add('opacity-50', 'cursor-not-allowed');
                }
            });

            // Prevent default Enter (allow Shift+Enter for newline)
            els.chatInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    if (!isGenerating && this.value.trim() !== '') {
                        els.chatForm.dispatchEvent(new Event('submit'));
                    }
                }
            });

            // --- API Integration (Streaming) ---
            const sendMessage = async (e) => {
                e.preventDefault();
                if (isGenerating) return;

                const text = els.chatInput.value.trim();
                if (!text) return;

                // Validate API Key
                if (!settings.apiKey) {
                    alert("Please set your OpenRouter API Key in settings first.");
                    els.settingsBtn.click();
                    return;
                }

                // Reset Input
                els.chatInput.value = '';
                els.chatInput.style.height = '44px';
                els.sendBtn.classList.add('opacity-50', 'cursor-not-allowed');

                // Initialize Chat if needed
                if (!activeChatId) {
                    activeChatId = generateId();
                    chats.push({
                        id: activeChatId,
                        title: text.length > 30 ? text.substring(0, 30) + '...' : text,
                        messages: [
                            { role: 'system', content: settings.systemPrompt }
                        ]
                    });
                    renderSidebar();
                    updateHeaderTitle();
                }

                els.welcomeScreen.classList.add('hidden');

                const currentChat = chats.find(c => c.id === activeChatId);
                
                // Add User Message
                const userMsg = { role: 'user', content: text };
                currentChat.messages.push(userMsg);
                els.chatContainer.appendChild(createMessageBubble('user', text));
                saveState();
                scrollToBottom();

                // Prepare AI Response Placeholder
                isGenerating = true;
                const aiBubbleId = `ai-${Date.now()}`;
                const aiBubble = createMessageBubble('assistant', '', aiBubbleId);
                els.chatContainer.appendChild(aiBubble);
                scrollToBottom();

                const aiInner = aiBubble.querySelector('.markdown-body');
                let fullResponse = "";

                // Send to OpenRouter
                abortController = new AbortController();
                
                // Construct messages payload (ensure system prompt is included if exists)
                const payloadMessages = currentChat.messages.map(m => ({
                    role: m.role,
                    content: m.content
                }));

                try {
                    const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${settings.apiKey}`
                        },
                        body: JSON.stringify({
                            model: settings.model,
                            messages: payloadMessages,
                            stream: true
                        }),
                        signal: abortController.signal
                    });

                    if (!response.ok) {
                        const err = await response.json().catch(()=>({}));
                        throw new Error(err.error?.message || `API Error: ${response.status}`);
                    }

                    const reader = response.body.getReader();
                    const decoder = new TextDecoder('utf-8');
                    let done = false;

                    while (!done) {
                        const { value, done: readerDone } = await reader.read();
                        done = readerDone;
                        
                        if (value) {
                            const chunk = decoder.decode(value, { stream: true });
                            const lines = chunk.split('\n');
                            
                            for (const line of lines) {
                                if (line.trim() === '') continue;
                                if (line.startsWith('data: ')) {
                                    const dataStr = line.substring(6);
                                    if (dataStr === '[DONE]') continue;
                                    
                                    try {
                                        const data = JSON.parse(dataStr);
                                        const delta = data.choices[0]?.delta?.content;
                                        if (delta) {
                                            fullResponse += delta;
                                            aiInner.innerHTML = marked.parse(fullResponse) + '<span class="cursor-blink"></span>';
                                            // intelligent scroll: only scroll if user is near bottom
                                            const isNearBottom = document.body.scrollHeight - window.scrollY - window.innerHeight < 150;
                                            if(isNearBottom) scrollToBottom();
                                        }
                                    } catch (err) {
                                        console.warn("Parse error for chunk line:", line, err);
                                    }
                                }
                            }
                        }
                    }

                } catch (error) {
                    if (error.name !== 'AbortError') {
                        fullResponse += `\n\n**Error:** ${error.message}`;
                    }
                } finally {
                    isGenerating = false;
                    // Finalize rendering
                    aiInner.innerHTML = marked.parse(fullResponse);
                    
                    // Save to state
                    currentChat.messages.push({ role: 'assistant', content: fullResponse });
                    saveState();
                    scrollToBottom();
                }
            };

            els.chatForm.addEventListener('submit', sendMessage);

            // --- Initialization ---
            const init = () => {
                applyTheme();
                renderSidebar();
                loadActiveChat();
                
                // Hide loader and show app safely
                setTimeout(() => {
                    els.loading.classList.add('hidden');
                    els.app.classList.remove('hidden');
                }, 300);
            };

            // Ensure Marked.js is loaded
            if (typeof marked !== 'undefined') {
                init();
            } else {
                const checkMarked = setInterval(() => {
                    if (typeof marked !== 'undefined') {
                        clearInterval(checkMarked);
                        init();
                    }
                }, 100);
            }
        });
    </script>
</body>
</html>
